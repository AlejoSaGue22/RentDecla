<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { background: #2563eb; color: white; padding: 20px; text-align: center; }
    .content { padding: 20px; background: #f9fafb; }
    .button { display: inline-block; padding: 12px 24px; background: #2563eb; color: white; text-decoration: none; border-radius: 6px; margin: 20px 0; }
    .footer { text-align: center; padding: 20px; color: #6b7280; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Nuevo Documento Subido</h1>
    </div>
    <div class="content">
      <p>El cliente <strong>{{clientName}}</strong> ha subido un nuevo documento:</p>
      <p><strong>Documento:</strong> {{documentName}}</p>
      <p><strong>Categoría:</strong> {{category}}</p>
      <p><strong>Fecha:</strong> {{uploadDate}}</p>
      <p>Por favor, revisa el documento en el sistema.</p>
      <p><a href="{{reviewUrl}}" class="button">Revisar Documento</a></p>
    </div>
    <div class="footer">
      <p>RentDecla - Sistema de Declaración de Renta</p>
    </div>
  </div>
</body>
</html>
