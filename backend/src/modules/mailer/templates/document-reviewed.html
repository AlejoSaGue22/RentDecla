<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .header { background: #2563eb; color: white; padding: 20px; text-align: center; }
    .content { padding: 20px; background: #f9fafb; }
    .approved { color: #16a34a; font-weight: bold; }
    .rejected { color: #dc2626; font-weight: bold; }
    .requires-correction { color: #ea580c; font-weight: bold; }
    .button { display: inline-block; padding: 12px 24px; background: #2563eb; color: white; text-decoration: none; border-radius: 6px; margin: 20px 0; }
    .footer { text-align: center; padding: 20px; color: #6b7280; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Documento Revisado</h1>
    </div>
    <div class="content">
      <p>Hola <strong>{{clientName}}</strong>,</p>
      <p>Tu documento <strong>{{documentName}}</strong> ha sido revisado.</p>
      <p class="{{decisionClass}}">Estado: {{decisionLabel}}</p>
      {{#if comment}}
      <p><strong>Comentario del contador:</strong></p>
      <p style="background: #f3f4f6; padding: 15px; border-radius: 6px;">{{comment}}</p>
      {{/if}}
      <p><a href="{{portalUrl}}" class="button">Ver en Portal</a></p>
    </div>
    <div class="footer">
      <p>RentDecla - Sistema de Declaración de Renta</p>
    </div>
  </div>
</body>
</html>
